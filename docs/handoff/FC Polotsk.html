// ----- Lucide icon helper (uses lucide UMD raw icon nodes) -----
const Icon = ({ name, size = 20, className = '', strokeWidth = 2 }) => {
  const lucide = window.lucide;
  if (!lucide || !lucide.icons) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;
  const nodes = lucide.icons[name];
  if (!nodes) return <span className={className} style={{ width: size, height: size, display: 'inline-block' }} />;
  const children = Array.isArray(nodes) && Array.isArray(nodes[2]) ? nodes[2] : [];
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
      {children.map(([tag, attrs], i) => React.createElement(tag, { key: `${tag}-${i}`, ...attrs }))}
    </svg>
  );
};

function Countdown({ target }) {
  const [t, setT] = useState({ d: 0, h: 0, m: 0, s: 0 });
  useEffect(() => {
    const tick = () => {
      const diff = Math.max(0, target.getTime() - Date.now());
      setT({
        d: Math.floor(diff / 86400000),
        h: Math.floor((diff % 86400000) / 3600000),
        m: Math.floor((diff % 3600000) / 60000),
        s: Math.floor((diff % 60000) / 1000),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [target]);

  const cells = [
    { v: t.d, l: 'Дней' },
    { v: t.h, l: 'Часов' },
    { v: t.m, l: 'Минут' },
    { v: t.s, l: 'Секунд' },
  ];
  return (
    <div className="flex items-center justify-between gap-2 sm:gap-4">
      {cells.map((c, i) => (
        <React.Fragment key={c.l}>
          <div className="flex flex-col items-center min-w-0">
            <div className="font-display text-3xl sm:text-4xl md:text-5xl tabular-nums leading-none text-white">{String(c.v).padStart(2, '0')}</div>
            <div className="text-[9px] sm:text-[10px] uppercase tracking-[0.2em] text-white/60 mt-2">{c.l}</div>
          </div>
          {i < cells.length - 1 && <div className="text-white/30 text-2xl sm:text-3xl font-display">:</div>}
        </React.Fragment>
      ))}
    </div>
  );
}

function App() {
  const [activeSection, setActiveSection] = useState('top');
  useEffect(() => {
    const ids = ['top', ...NAV.map(n => n.id)];
    const onScroll = () => {
      let current = 'top';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top <= 120) current = id;
      }
      setActiveSection(current);
    };
    window.addEventListener('scroll', onScroll);
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div data-screen-label="FC Polotsk Home">
      <Header activeSection={activeSection} />
      <Hero />
      <MatchCenter />
      <News />
      <Team />
      <Social />
      <Results />
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
